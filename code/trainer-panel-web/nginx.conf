server {
    # O Nginx escutará na porta 80 dentro do container
    listen 80;

    # Local onde os arquivos do nosso site estão
    root /usr/share/nginx/html;
    index index.html;

    # Serve os arquivos estáticos diretamente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # <<< PONTO CRÍTICO >>>
    # Redireciona todas as chamadas para /api para o nosso backend
    # O Nginx atua como um "proxy reverso"
    location /api/ {
        # "connect_sports_backend" é o nome do serviço do seu backend no docker-compose
        # A porta é a porta INTERNA do container do backend
        proxy_pass http://connect_sports_backend:3000/;

        # Cabeçalhos importantes para o proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}